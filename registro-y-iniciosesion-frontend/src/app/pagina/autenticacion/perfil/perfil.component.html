
<div class="perfil">

    <div class="menu-lateral">
        <button class="btn-accion" (click)="permisosPerfil()" matTooltip="Editar Perfil" matTooltipPosition="left" matTooltipHideDelay="100"><mat-icon>assignment_ind</mat-icon></button>
        <button class="btn-accion" (click)="permisosUsuarios()" matTooltip="Usuarios" matTooltipPosition="left" matTooltipHideDelay="100"><mat-icon>accessibility_new</mat-icon></button>
        <button class="btn-accion" (click)="permisosRol()" matTooltip="Rol" matTooltipPosition="left" matTooltipHideDelay="100"><mat-icon>assignment_turned_in</mat-icon></button>
        <button class="btn-accion" (click)="permisosPermisos()" matTooltip="Permisos" matTooltipPosition="left" matTooltipHideDelay="100"><mat-icon>lock_person  </mat-icon></button>
        <button class="btn-accion" (click)="permisosxRol()" matTooltip="Permisos por Rol" matTooltipPosition="left" matTooltipHideDelay="100"><mat-icon>verified_user </mat-icon></button>
    </div>

    <div class="tarjeta">   
        <div class="tarjeta__cuerpo">
            <div class="tarjeta__cabeza">
                <strong>{{Usuario?.nombre}}</strong>
            </div>

            <p class="tarjeta__rol">
                <strong>Rol: </strong> 
                <span class="rol">{{Usuario?.rol?.nombre}}</span>
            </p>

            <div class="tarjeta__permisos">
                <p><strong>Permisos:</strong></p>
                <ul class="permisos">
                    <li *ngFor="let permiso of Usuario?.rol?.permisos">
                        <mat-icon>done_all</mat-icon>
                        {{ permiso.nombre }}
                    </li>
                </ul>
            </div>
        </div>

        <div class="card__ribbon">
            <label class="card__ribbon-label">
                <mat-icon> person_pin</mat-icon>
            </label>
            <button class="btn-logout-icon" (click)="cerrarSesion()" matTooltip="Cerrar sesión"  matTooltip="Cerrar sesión" matTooltipPosition="below" matTooltipHideDelay="100"> 
                <mat-icon>logout</mat-icon>
            </button>
        </div>
    </div>
</div>
