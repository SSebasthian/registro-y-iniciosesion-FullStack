<div class="acceso">
    <div class="content">
        <div class="text">
            Iniciar Sesión
        </div>
        <form (ngSubmit)="iniciarSesion()">

            <div class="field">
                <input required="" type="text" class="input" [(ngModel)]="usuario" name="usuario">
                <span class="span">
                    <mat-icon>person</mat-icon>
                </span>
                <label class="label">Usuario</label>
            </div>

            <div class="field">
                <input required="" type="password" class="input" [(ngModel)]="clave" name="clave">
                <span class="span">
                    <mat-icon>fingerprint</mat-icon>
                </span>
                <label class="label">Contraseña</label>
            </div>
            
            <button class="button">Acceder</button>
            <div class="registrarse">
                ¿Aún no tienes cuenta?
                <a routerLink="/autenticacion/registro">Registrarme</a>
            </div>
        </form>

        <p *ngIf="mensaje">{{ mensaje }}</p>
    </div>
</div>
